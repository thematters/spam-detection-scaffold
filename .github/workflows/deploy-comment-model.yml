name: deploy-comment-model

# Builds and deploys the COMMENT spam model (e5-small + logreg head) as its own
# Lambda stack -- separate from the article model's `spam-model-service`, so the
# two never clobber each other. Manual only.
#
# Auth: GitHub OIDC (no long-lived AWS keys stored in the repo). The job exchanges
# a short-lived GitHub OIDC token for the deploy role via STS.
#
# Prerequisites (one-time, done by an AWS admin -- see infra/oidc/ in this PR):
#   1. Create the GitHub OIDC provider + deploy role (infra/oidc/setup.sh).
#   2. Set the repo VARIABLE (not secret) AWS_DEPLOY_ROLE_ARN to that role's ARN
#        (Settings -> Secrets and variables -> Actions -> Variables).
#   3. Train + export the artifact and upload to S3:
#        python trains/spam/train_comment_head.py   # -> spam_comment_e5.tar
#        aws s3 cp trains/spam/spam_comment_e5.tar s3://<bucket>/comment-model/spam_comment_e5.tar
#      then run this workflow with model_s3_uri pointing at the object.
#
# The Dockerfile fetches the tar via ADD <url>; we presign the S3 object at
# deploy time so the build can read it without making the bucket public.

on:
  workflow_dispatch:
    inputs:
      model_s3_uri:
        description: "s3://bucket/key of the model tar"
        required: true
      stack_name:
        description: "CloudFormation stack name"
        default: spam-comment-model-service
      region:
        description: "AWS region"
        default: ap-southeast-1
      lambda_role_arn:
        description: "Lambda execution role ARN"
        default: arn:aws:iam::903380195283:role/service-role/spam-detection-role-ot57al3z

permissions:
  id-token: write   # required for OIDC token
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install SAM CLI
        run: pip install aws-sam-cli
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ github.event.inputs.region }}
      - name: Presign model tar URL
        id: presign
        run: |
          url="$(aws s3 presign '${{ github.event.inputs.model_s3_uri }}' --expires-in 3600)"
          echo "::add-mask::$url"
          echo "url=$url" >> "$GITHUB_OUTPUT"
      - name: SAM build
        run: |
          sam build \
            --parameter-overrides \
              "SpamModelTarUrl=${{ steps.presign.outputs.url }}" \
              "LambdaRoleArn=${{ github.event.inputs.lambda_role_arn }}"
      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name "${{ github.event.inputs.stack_name }}" \
            --region "${{ github.event.inputs.region }}" \
            --resolve-s3 --resolve-image-repos \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-confirm-changeset --no-fail-on-empty-changeset \
            --parameter-overrides \
              "SpamModelTarUrl=${{ steps.presign.outputs.url }}" \
              "LambdaRoleArn=${{ github.event.inputs.lambda_role_arn }}"
      - name: Show endpoint
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${{ github.event.inputs.stack_name }}" \
            --region "${{ github.event.inputs.region }}" \
            --query "Stacks[0].Outputs" --output table
