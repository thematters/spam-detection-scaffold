name: export-training-samples

# Layer 1 (軸二) — daily passive harvest of confirmed-spam + hard-negative ham
# comments into the S3 training bucket, de-identified. Incremental via an S3
# watermark. Read-only against the read-replica; never writes to matters DB.
#
# Prerequisites (ops):
#   - secrets: PG_READONLY_CONN (read-replica DSN), HASH_SALT
#   - vars:    EXPORT_S3_BUCKET, EXPORT_S3_PREFIX (optional)
#   - OIDC deploy/role with s3:GetObject/PutObject on the training bucket
#     (reuse AWS_DEPLOY_ROLE_ARN or a dedicated read/write role).

on:
  schedule:
    - cron: "30 2 * * *"   # daily 02:30 UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Lookback when no watermark exists"
        default: "30"

permissions:
  id-token: write
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "psycopg[binary]" pandas pyarrow boto3
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1
      - name: Export training samples
        env:
          PG_READONLY_CONN: ${{ secrets.PG_READONLY_CONN }}
          HASH_SALT: ${{ secrets.HASH_SALT }}
          EXPORT_S3_BUCKET: ${{ vars.EXPORT_S3_BUCKET }}
          EXPORT_S3_PREFIX: ${{ vars.EXPORT_S3_PREFIX }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '30' }}
        run: python scripts/export_training_samples.py
