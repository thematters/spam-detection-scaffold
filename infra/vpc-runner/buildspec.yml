# CodeBuild buildspec — VPC 內執行入口，跑「需要連 read-replica」的批次工作。
# 用環境變數 JOB 選工作：ring | moment-ring | ring-shadow-v2 | moment-ring-shadow-v2 |
# ring-incremental | moment-ring-incremental | acceptance | l1 | ring-watchlist
# 觸發：aws codebuild start-build --project-name spam-vpc-runner \
#         --environment-variables-override name=JOB,value=ring
version: 0.2

env:
  variables:
    JOB: "ring"          # ring | acceptance | l1
    BUCKET: "matters-spam-training-samples"
    STAGING_ENDPOINT: "https://fjrmugbg5j.execute-api.ap-southeast-1.amazonaws.com/Prod/spam/infer/"
  parameter-store:
    PG_DSN: "/prod/matters-server/MATTERS_PG_READONLY_CONNECTION_STRING"
    HASH_SALT: "/prod/matters-server/MATTERS_SPAM_SAMPLE_HASH_SALT"

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      # psql 給 ring SQL；psycopg(v3) 給 acceptance/l1（與 export_training_samples.py 一致）
      - (yum install -y postgresql15 || yum install -y postgresql || amazon-linux-extras install -y postgresql14) >/dev/null 2>&1 || true
      - pip install -q "psycopg[binary]" requests cloudscraper opencc-python-reimplemented boto3 pandas pyarrow
  build:
    commands:
      - echo "JOB=$JOB  (連線走 in-VPC replica，DSN/salt 來自 SSM，不落地不印出)"
      - |
        set -e
        case "$JOB" in
          ring)
            # 軸一 D：文章層 ring 偵測。
            # 1) DB 端粗篩 → CSV 存證（含 author_ids/article_ids）
            psql "$PG_DSN" -v days="${DAYS:-30}" -v min_authors="${MIN_AUTHORS:-3}" \
                 -v new_account_days="${NEW_ACCOUNT_DAYS:-30}" \
                 -v single_author_min_posts="${SINGLE_AUTHOR_MIN_POSTS:-3}" \
                 -f sql/detect_spam_rings.sql --csv -o /tmp/ring_candidates.csv
            aws s3 cp /tmp/ring_candidates.csv "s3://${BUCKET}/ring-candidates/$(date +%Y-%m-%d)/candidates.csv"
            # 影子決策（軸一 D 階段一）：產出「若上線會凍結誰」的報告，純記錄不執行任何處置。
            python eval/ring_decide.py /tmp/ring_candidates.csv --out /tmp/ring_shadow.json
            aws s3 cp /tmp/ring_shadow.json "s3://${BUCKET}/article-ring-shadow/$(date +%Y-%m-%d)/decisions.json"
            # 2) app 層精修（近似/實體/邀請碼/品牌/亂碼）+ 寫回 matters-server upsertSpamRingCandidates。
            #    影子先行：未設 MATTERS_OSS_GQL_ENDPOINT / MATTERS_OSS_ADMIN_TOKEN 時只印候選、不寫回、不處置。
            #    AUTO_FREEZE（SPEC_RING_V2 F3b）由 CodeBuild 環境變數控制，預設不設＝影子/人工一鍵。
            DAYS="${DAYS:-30}" MIN_AUTHORS="${MIN_AUTHORS:-3}" NEW_ACCOUNT_DAYS="${NEW_ACCOUNT_DAYS:-30}" \
              SINGLE_AUTHOR_MIN_POSTS="${SINGLE_AUTHOR_MIN_POSTS:-3}" \
              SHADOW_REPORT_OUT=/tmp/article_ring_v2_shadow.json \
              python scripts/ring_detect_job.py || detect_status=$?
            aws s3 cp /tmp/article_ring_v2_shadow.json "s3://${BUCKET}/ring-v2-shadow/article/$(date -u +%Y-%m-%d)/decisions.json"
            if [ "${detect_status:-0}" -ne 0 ]; then
              exit "$detect_status"
            fi
            ;;
          acceptance)
            # 軸一 B：conformal 定論驗收，從 replica 撈乾淨 held-out ham 打 staging endpoint
            python eval/staging_conformal_accept.py --source replica --dsn-env PG_DSN \
                   --endpoint "$STAGING_ENDPOINT" --ham "${HAM:-300}" --spam "${SPAM:-150}" \
                   --concurrency "${CONC:-3}" --out /tmp/acceptance.json
            aws s3 cp /tmp/acceptance.json "s3://${BUCKET}/conformal-acceptance/$(date +%Y-%m-%d)/result.json"
            ;;
          l1)
            # 軸二 L1：被動增量抽取訓練樣本（純 env 介面；salt 與 L2 同源以跨層去重）
            PG_READONLY_CONN="$PG_DSN" EXPORT_S3_BUCKET="$BUCKET" HASH_SALT="$HASH_SALT" \
              python scripts/export_training_samples.py
            ;;
          heldout)
            # 撈 id>截點的乾淨 held-out（老帳號 ham + 受限作者 spam）寫 S3，給本地用重訓模型評分驗收
            python eval/staging_conformal_accept.py --source replica --dsn-env PG_DSN \
                   --endpoint x --ham "${HAM:-500}" --spam "${SPAM:-250}" \
                   --dump /tmp/heldout.jsonl
            aws s3 cp /tmp/heldout.jsonl "s3://${BUCKET}/heldout-eval/$(date +%Y-%m-%d)/heldout.jsonl"
            ;;
          moment-ring)
            # 軸一 D（動態版）：moment ring 偵測。流程與文章 ring 段一致（粗篩→影子決策→app 精修寫回）。
            # 1) DB 端粗篩 → CSV 存證（含 author_ids/moment_ids）
            psql "$PG_DSN" -v days="${DAYS:-30}" -v min_authors="${MIN_AUTHORS:-3}" \
                 -v new_account_days="${NEW_ACCOUNT_DAYS:-30}" \
                 -v single_author_min_posts="${SINGLE_AUTHOR_MIN_POSTS:-3}" \
                 -f sql/detect_spam_rings_moment.sql --csv -o /tmp/moment_ring_candidates.csv
            wc -l /tmp/moment_ring_candidates.csv
            aws s3 cp /tmp/moment_ring_candidates.csv "s3://${BUCKET}/moment-ring-candidates/$(date +%Y-%m-%d)/candidates.csv"
            # 影子決策（軸一 D 階段一）：產出「若上線會凍結誰」的報告，純記錄不執行任何處置。
            python eval/ring_decide.py /tmp/moment_ring_candidates.csv --out /tmp/moment_shadow.json
            aws s3 cp /tmp/moment_shadow.json "s3://${BUCKET}/moment-ring-shadow/$(date +%Y-%m-%d)/decisions.json"
            # 2) app 層精修（近似/實體/邀請碼/品牌/亂碼）+ 寫回 matters-server upsertSpamRingCandidates。
            #    影子先行：未設 MATTERS_OSS_GQL_ENDPOINT / MATTERS_OSS_ADMIN_TOKEN 時只印候選、不寫回、不處置。
            #    AUTO_FREEZE（SPEC_RING_V2 F3b）由 CodeBuild 環境變數控制，預設不設＝影子/人工一鍵。
            CONTENT_TYPE=moment DAYS="${DAYS:-30}" MIN_AUTHORS="${MIN_AUTHORS:-3}" NEW_ACCOUNT_DAYS="${NEW_ACCOUNT_DAYS:-30}" \
              SINGLE_AUTHOR_MIN_POSTS="${SINGLE_AUTHOR_MIN_POSTS:-3}" \
              SHADOW_REPORT_OUT=/tmp/moment_ring_v2_shadow.json \
              python scripts/ring_detect_job.py || detect_status=$?
            aws s3 cp /tmp/moment_ring_v2_shadow.json "s3://${BUCKET}/ring-v2-shadow/moment/$(date -u +%Y-%m-%d)/decisions.json"
            if [ "${detect_status:-0}" -ne 0 ]; then
              exit "$detect_status"
            fi
            ;;
          ring-shadow-v2)
            # 精修後唯讀影子：純圖過濾、驗證成員交集、實體合併皆完成，不 upsert、不凍結。
            DRY_RUN=1 SHADOW_REPORT_OUT=/tmp/article_ring_v2_shadow.json \
              DAYS="${DAYS:-30}" MIN_AUTHORS="${MIN_AUTHORS:-3}" \
              NEW_ACCOUNT_DAYS="${NEW_ACCOUNT_DAYS:-30}" \
              SINGLE_AUTHOR_MIN_POSTS="${SINGLE_AUTHOR_MIN_POSTS:-3}" \
              python scripts/ring_detect_job.py
            aws s3 cp /tmp/article_ring_v2_shadow.json "s3://${BUCKET}/ring-v2-shadow/article/$(date -u +%Y-%m-%d)/decisions.json"
            ;;
          moment-ring-shadow-v2)
            CONTENT_TYPE=moment DRY_RUN=1 SHADOW_REPORT_OUT=/tmp/moment_ring_v2_shadow.json \
              DAYS="${DAYS:-30}" MIN_AUTHORS="${MIN_AUTHORS:-3}" \
              NEW_ACCOUNT_DAYS="${NEW_ACCOUNT_DAYS:-30}" \
              SINGLE_AUTHOR_MIN_POSTS="${SINGLE_AUTHOR_MIN_POSTS:-3}" \
              python scripts/ring_detect_job.py
            aws s3 cp /tmp/moment_ring_v2_shadow.json "s3://${BUCKET}/ring-v2-shadow/moment/$(date -u +%Y-%m-%d)/decisions.json"
            ;;
          ring-incremental)
            # 軸一 D 增量版（SPEC_RING_V2）：S3 滾動指紋狀態，只掃水位線後新貼文，
            # 掃描量 ∝ 發文速率。高頻排程用；全量 ring/moment-ring 每日一次當對帳。
            python scripts/ring_incremental_job.py
            ;;
          moment-ring-incremental)
            CONTENT_TYPE=moment python scripts/ring_incremental_job.py
            ;;
          ring-watchlist)
            # Read-only sanity check for known recurring spam-ring families.
            # This does not upsert candidates or freeze accounts; it helps
            # distinguish detector signal health from EventBridge/CodeBuild
            # scheduling problems when the Telegram digest looks stale.
            python scripts/check_ring_watchlist.py --json --first "${RING_WATCHLIST_FIRST:-30}" \
              > /tmp/ring_watchlist.json
            aws s3 cp /tmp/ring_watchlist.json "s3://${BUCKET}/ring-watchlist/$(date +%Y-%m-%d)/result.json"
            ;;
          moment-heldout)
            # 撈動態乾淨 held-out（老帳號 ham + 受限作者 spam）寫 S3，給本地打短內容模型量誤殺/召回。
            # 動態短內容 → min-text-len 預設較低（10）；無 article id 截點，用帳號年齡分層。
            python eval/staging_conformal_accept.py --source replica --dsn-env PG_DSN \
                   --content-type moment --endpoint x --seed "${SEED:-42}" \
                   --min-text-len "${MINLEN:-10}" --ham "${HAM:-500}" --spam "${SPAM:-250}" \
                   --dump /tmp/moment_heldout.jsonl
            aws s3 cp /tmp/moment_heldout.jsonl "s3://${BUCKET}/moment-heldout-eval/$(date +%Y-%m-%d)/heldout.jsonl"
            ;;
          train-moment)
            # P2：訓練專用動態模型（e5-small 凍結 + logreg head，複用 train_comment_head.py）。
            # 不連 replica；讀 S3 矯正訓練集 → 切 pos/neg parquet → 訓練 → tar 上 S3。
            TRAINCSV="${TRAINCSV:-s3://matters-spam-training-samples/moment-trainset/$(date +%Y-%m-%d)/trainset.csv}"
            # 版本必須與 serving image（spam/requirements.txt）一致,否則存的模型 serving 載不動
            pip install -q torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu
            pip install -q "transformers==4.46.2" "sentence-transformers==3.3.1" "numpy==1.26.4" scikit-learn
            aws s3 cp "$TRAINCSV" /tmp/trainset.csv
            python -c "import pandas as pd; df=pd.read_csv('/tmp/trainset.csv'); df[df.is_spam==1][['is_spam','content']].to_parquet('/tmp/pos.parquet'); df[df.is_spam==0][['content']].to_parquet('/tmp/neg.parquet'); print('pos',int((df.is_spam==1).sum()),'neg',int((df.is_spam==0).sum()))"
            python trains/spam/train_comment_head.py \
                   --positives /tmp/pos.parquet --negatives /tmp/neg.parquet \
                   --model intfloat/multilingual-e5-small \
                   --out-dir /tmp/moment_model --tar /tmp/moment-v1.tar
            aws s3 cp /tmp/moment-v1.tar "s3://${BUCKET}/moment-model/moment-v1-$(date +%Y%m%d).tar"
            ;;
          score-moment)
            # P3：用訓練好的動態模型對 held-out 打分（雲端,需 torch）。HELDOUT/MODELTAR 用 env 指定。
            HELDOUT="${HELDOUT:?need HELDOUT s3 uri}"
            MODELTAR="${MODELTAR:?need MODELTAR s3 uri}"
            pip install -q torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu
            pip install -q "transformers==4.46.2" "sentence-transformers==3.3.1" "numpy==1.26.4"
            aws s3 cp "$MODELTAR" /tmp/m.tar; mkdir -p /tmp/m; tar xf /tmp/m.tar -C /tmp/m
            aws s3 cp "$HELDOUT" /tmp/heldout.jsonl
            python eval/score_moment.py --model-dir /tmp/m --in /tmp/heldout.jsonl --out /tmp/scored.jsonl
            aws s3 cp /tmp/scored.jsonl "s3://${BUCKET}/moment-p3-scored/$(date +%Y-%m-%d)/scored.jsonl"
            ;;
          *) echo "unknown JOB=$JOB" && exit 1 ;;
        esac
  post_build:
    commands:
      - echo "post-build reached for JOB=$JOB; use the CodeBuild status as the outcome"

artifacts:
  files:
    - /tmp/acceptance.json
  discard-paths: yes
